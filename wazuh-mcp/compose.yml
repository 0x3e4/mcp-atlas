# Optional: run the server as an always-on streamable-HTTP service.
# For the lightweight stdio setup you do NOT need this — see the README.
services:
  wazuh-mcp:
    build: .
    image: wazuh-mcp
    env_file: wazuh.env
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped
    # If using a self-signed CA, mount it and set WAZUH_CA_BUNDLE in wazuh.env:
    # volumes:
    #   - /etc/wazuh-indexer/certs/root-ca.pem:/certs/root-ca.pem:ro
