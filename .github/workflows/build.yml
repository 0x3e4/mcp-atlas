name: build-images

# Build every *-mcp server image and push to GHCR (ghcr.io/<owner>/<server>).
# Images are consumed by each server's compose.yml.example.
on:
  push:
    branches: [main]
    paths:
      - "*-mcp/**"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - azure-devops-mcp
          - bookstack-mcp
          - defender-mcp
          - fortigate-mcp
          - netbox-mcp
          - netscaler-mcp
          - prtg-mcp
          - snipeit-mcp
          - vcenter-mcp
          - wazuh-mcp
          - zammad-mcp
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.server }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.server }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.server }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.server }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.server }}
          cache-to: type=gha,mode=max,scope=${{ matrix.server }}
